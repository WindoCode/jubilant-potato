<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GvG Strategy Board – Where Winds Meet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

  :root {
    --red: #c0392b;
    --red-light: #e74c3c;
    --blue: #2980b9;
    --blue-light: #3498db;
    --gold: #f0c040;
    --panel-bg: rgba(10,12,18,0.88);
    --border: rgba(200,180,120,0.35);
    --text: #e8dfc0;
    --text-dim: #a09070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0c12;
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── TOP BAR ── */
  #topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 14px;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    flex-wrap: wrap;
  }

  #topbar h1 {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--gold);
    white-space: nowrap;
    margin-right: 6px;
  }

  .sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

  /* Tool buttons */
  .tool-group { display: flex; gap: 4px; align-items: center; }
  .tool-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .tool-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--gold); }
  .tool-btn.active { background: var(--gold); color: #111; border-color: var(--gold); }
  .tool-btn.red-team { border-color: var(--red); color: var(--red-light); }
  .tool-btn.red-team.active { background: var(--red); color: #fff; }
  .tool-btn.blue-team { border-color: var(--blue); color: var(--blue-light); }
  .tool-btn.blue-team.active { background: var(--blue); color: #fff; }

  .color-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-dot:hover { transform: scale(1.2); }
  .color-dot.active { border-color: #fff; transform: scale(1.15); }

  #stroke-size {
    width: 60px;
    accent-color: var(--gold);
    cursor: pointer;
  }

  #zoom-display {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    min-width: 44px;
    text-align: center;
  }

  /* ── MAP VIEWPORT ── */
  #map-viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: crosshair;
  }
  #map-viewport.panning { cursor: grab; }
  #map-viewport.panning-active { cursor: grabbing; }

  /* ── MAP CONTAINER (transformed) ── */
  #map-container {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    /* size set by JS */
  }

  /* Background image */
  #map-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    pointer-events: none;
    display: block;
  }

  /* Drawing canvas */
  #draw-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  /* Markers layer */
  #markers-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .marker {
    position: absolute;
    transform: translate(-50%, -50%);
    pointer-events: all;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    z-index: 10;
  }
  .marker-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    border: 2px solid rgba(255,255,255,0.6);
    box-shadow: 0 2px 8px rgba(0,0,0,0.7);
    transition: transform 0.15s;
  }
  .marker:hover .marker-icon { transform: scale(1.2); }
  .marker-label {
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 2px;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  /* Arrow layer */
  #arrow-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  /* ── BOTTOM STATUS BAR ── */
  #statusbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 4px 14px;
    background: var(--panel-bg);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    z-index: 100;
  }
  #statusbar span { white-space: nowrap; }
  #coords { color: var(--gold); font-weight: 600; }

  /* ── CONTEXT MENU ── */
  #ctx-menu {
    position: fixed;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 0;
    z-index: 999;
    min-width: 140px;
    display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.7);
  }
  #ctx-menu div {
    padding: 7px 16px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    color: var(--text);
    transition: background 0.1s;
  }
  #ctx-menu div:hover { background: rgba(255,255,255,0.08); color: var(--gold); }
  #ctx-menu .danger:hover { color: #e74c3c; }
  #ctx-menu hr { border: none; border-top: 1px solid var(--border); margin: 3px 0; }

  /* ── LABEL EDIT POPUP ── */
  #label-popup {
    position: fixed;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    z-index: 1000;
    display: none;
    box-shadow: 0 4px 24px rgba(0,0,0,0.8);
  }
  #label-popup input {
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border-radius: 3px;
    width: 160px;
    outline: none;
  }
  #label-popup input:focus { border-color: var(--gold); }
  #label-popup button {
    margin-left: 6px;
    background: var(--gold);
    border: none;
    color: #111;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
  }

  /* ── LEGEND ── */
  #legend {
    position: absolute;
    bottom: 8px; right: 8px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 12px;
    font-size: 11px;
    pointer-events: none;
    z-index: 50;
  }
  #legend .leg-title {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  #legend .leg-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; color: var(--text-dim); }
  #legend .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<!-- ══ TOP BAR ══ -->
<div id="topbar">
  <h1>⚔ GvG STRATEGY BOARD</h1>
  <div class="sep"></div>

  <!-- Mode -->
  <div class="tool-group">
    <button class="tool-btn active" id="btn-draw" onclick="setMode('draw')">✏ DRAW</button>
    <button class="tool-btn" id="btn-arrow" onclick="setMode('arrow')">➤ ARROW</button>
    <button class="tool-btn" id="btn-marker" onclick="setMode('marker')">📍 MARKER</button>
    <button class="tool-btn" id="btn-pan" onclick="setMode('pan')">✋ PAN</button>
    <button class="tool-btn" id="btn-erase" onclick="setMode('erase')">⌫ ERASE</button>
  </div>
  <div class="sep"></div>

  <!-- Team color presets -->
  <div class="tool-group">
    <span style="font-size:11px;color:var(--text-dim);letter-spacing:1px;">TEAM:</span>
    <button class="tool-btn red-team active" id="btn-red" onclick="setTeam('red')">● RED</button>
    <button class="tool-btn blue-team" id="btn-blue" onclick="setTeam('blue')">● BLUE</button>
  </div>
  <div class="sep"></div>

  <!-- Color palette -->
  <div class="tool-group" id="palette">
    <!-- filled by JS -->
  </div>
  <div class="sep"></div>

  <!-- Stroke size -->
  <div class="tool-group" style="gap:8px;">
    <span style="font-size:11px;color:var(--text-dim);letter-spacing:1px;">SIZE:</span>
    <input type="range" id="stroke-size" min="2" max="20" value="4" oninput="strokeWidth=+this.value">
  </div>
  <div class="sep"></div>

  <!-- Marker type -->
  <div class="tool-group" id="marker-types">
    <span style="font-size:11px;color:var(--text-dim);letter-spacing:1px;">ICON:</span>
    <!-- filled by JS -->
  </div>
  <div class="sep"></div>

  <!-- Zoom controls -->
  <div class="tool-group">
    <button class="tool-btn" onclick="zoomBy(-0.15)">−</button>
    <span id="zoom-display">100%</span>
    <button class="tool-btn" onclick="zoomBy(0.15)">+</button>
    <button class="tool-btn" onclick="resetView()">⊡ FIT</button>
  </div>
  <div class="sep"></div>

  <button class="tool-btn" onclick="clearAll()" style="color:#e74c3c;border-color:#c0392b;">🗑 CLEAR</button>
  <button class="tool-btn" onclick="undoLast()" style="margin-left:2px;">↩ UNDO</button>
</div>

<!-- ══ MAP VIEWPORT ══ -->
<div id="map-viewport">
  <div id="map-container">
    <img id="map-bg" src="" alt="GvG Map">
    <canvas id="draw-canvas"></canvas>
    <svg id="arrow-svg"></svg>
    <div id="markers-layer"></div>
    <div id="legend">
      <div class="leg-title">LEGEND</div>
      <div class="leg-row"><div class="leg-dot" style="background:#c0392b"></div>Red Team</div>
      <div class="leg-row"><div class="leg-dot" style="background:#2980b9"></div>Blue Team</div>
      <div class="leg-row"><div class="leg-dot" style="background:#27ae60"></div>Objective</div>
      <div class="leg-row"><div class="leg-dot" style="background:#f39c12"></div>Warning</div>
    </div>
  </div>
</div>

<!-- ══ STATUS BAR ══ -->
<div id="statusbar">
  <span>SCROLL TO ZOOM &nbsp;|&nbsp; MIDDLE-CLICK / PAN MODE TO PAN</span>
  <span id="coords">X: 0  Y: 0</span>
  <span id="mode-display">MODE: DRAW</span>
</div>

<!-- ══ CONTEXT MENU ══ -->
<div id="ctx-menu">
  <div onclick="ctxAction('label')">✏ Edit Label</div>
  <div onclick="ctxAction('color')">🎨 Change Color</div>
  <hr>
  <div onclick="ctxAction('delete')" class="danger">✕ Delete</div>
</div>

<!-- ══ LABEL POPUP ══ -->
<div id="label-popup">
  <input id="label-input" type="text" placeholder="Enter label..." maxlength="20">
  <button onclick="confirmLabel()">OK</button>
</div>

<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const MAP_W = 1350, MAP_H = 760; // natural image dimensions (approximate)

let mode = 'draw';
let team = 'red';
let strokeWidth = 4;
let currentColor = '#c0392b';
let markerIcon = '⚔';
let selectedMarker = null;

// Zoom / pan state
let scale = 1;
let panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panStartPX = 0, panStartPY = 0;

// Drawing state
let isDrawing = false;
let drawPath = [];
let currentStroke = null;

// Arrow state
let arrowStart = null;
let tempArrow = null;

// History (for undo)
let history = []; // each entry: {type:'stroke'|'arrow'|'marker', el, data}

// ══════════════════════════════════════════════
//  ELEMENTS
// ══════════════════════════════════════════════
const viewport   = document.getElementById('map-viewport');
const container  = document.getElementById('map-container');
const mapBg      = document.getElementById('map-bg');
const canvas     = document.getElementById('draw-canvas');
const ctx        = canvas.getContext('2d');
const arrowSvg   = document.getElementById('arrow-svg');
const markersLayer = document.getElementById('markers-layer');
const ctxMenu    = document.getElementById('ctx-menu');
const labelPopup = document.getElementById('label-popup');
const labelInput = document.getElementById('label-input');
const zoomDisp   = document.getElementById('zoom-display');
const coordsDisp = document.getElementById('coords');
const modeDisp   = document.getElementById('mode-display');

// ══════════════════════════════════════════════
//  LOAD MAP IMAGE from uploaded file
// ══════════════════════════════════════════════
// The image is embedded via the uploaded PNG file path.
// We use a FileReader approach by embedding the base64 image inline.
// Since we can't access the file system here, the user needs to set the src.
// We'll create a file-picker fallback + also try the sibling image name.
(function initMap() {
  // Try to use the uploaded image by name convention (same folder)
  // If the HTML file and image are in the same folder, this relative path works:
  mapBg.src = '1779727794127__CF7BF399-EA70-4A49-B523-22D2158394DB_.png';
  mapBg.onerror = () => {
    // fallback: show file picker
    showImagePicker();
  };
  mapBg.onload = () => {
    initCanvas();
  };
})();

function showImagePicker() {
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,0.85);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:9999;font-family:'Rajdhani',sans-serif;color:#e8dfc0;gap:16px;
  `;
  overlay.innerHTML = `
    <div style="font-family:'Cinzel',serif;font-size:18px;color:#f0c040;letter-spacing:3px;">MAP IMAGE NOT FOUND</div>
    <div style="font-size:13px;color:#a09070;text-align:center;max-width:400px;">
      Place the map PNG in the same folder as this HTML file,<br>or click below to load it manually.
    </div>
    <label style="
      background:#f0c040;color:#111;padding:10px 24px;border-radius:4px;
      font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;
    ">
      📂 LOAD MAP IMAGE
      <input type="file" accept="image/*" style="display:none" onchange="loadMapFromFile(event,this.closest('div[style]'))">
    </label>
  `;
  document.body.appendChild(overlay);
}

window.loadMapFromFile = function(e, overlay) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    mapBg.src = ev.target.result;
    mapBg.onload = () => {
      overlay.remove();
      initCanvas();
    };
  };
  reader.readAsDataURL(file);
};

function initCanvas() {
  const w = mapBg.naturalWidth  || MAP_W;
  const h = mapBg.naturalHeight || MAP_H;
  container.style.width  = w + 'px';
  container.style.height = h + 'px';
  canvas.width  = w;
  canvas.height = h;
  arrowSvg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  resetView();
}

// ══════════════════════════════════════════════
//  COLOUR PALETTE
// ══════════════════════════════════════════════
const COLORS = [
  '#c0392b','#e74c3c','#2980b9','#3498db',
  '#27ae60','#f39c12','#f1c40f','#9b59b6',
  '#ffffff','#e0c080','#00e5ff','#ff4081',
];

const MARKER_ICONS = ['⚔','🛡','💀','★','⚡','🏹','🔥','👁','❌','✓'];

function buildPalette() {
  const cont = document.getElementById('palette');
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'color-dot' + (c === currentColor ? ' active' : '');
    d.style.background = c;
    d.style.border = '2px solid rgba(255,255,255,0.2)';
    d.title = c;
    d.onclick = () => {
      document.querySelectorAll('.color-dot').forEach(x => x.classList.remove('active'));
      d.classList.add('active');
      currentColor = c;
    };
    cont.appendChild(d);
  });
}

function buildMarkerTypes() {
  const cont = document.getElementById('marker-types');
  MARKER_ICONS.forEach(ic => {
    const b = document.createElement('button');
    b.className = 'tool-btn' + (ic === markerIcon ? ' active' : '');
    b.textContent = ic;
    b.style.padding = '2px 7px';
    b.style.fontSize = '14px';
    b.onclick = () => {
      document.querySelectorAll('#marker-types .tool-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      markerIcon = ic;
    };
    cont.appendChild(b);
  });
}

buildPalette();
buildMarkerTypes();

// ══════════════════════════════════════════════
//  MODE / TEAM
// ══════════════════════════════════════════════
function setMode(m) {
  mode = m;
  ['draw','arrow','marker','pan','erase'].forEach(x => {
    document.getElementById('btn-'+x)?.classList.toggle('active', x === m);
  });
  viewport.classList.toggle('panning', m === 'pan');
  modeDisp.textContent = 'MODE: ' + m.toUpperCase();
  clearCtxMenu();
}

function setTeam(t) {
  team = t;
  document.getElementById('btn-red').classList.toggle('active', t === 'red');
  document.getElementById('btn-blue').classList.toggle('active', t === 'blue');
  currentColor = t === 'red' ? '#c0392b' : '#2980b9';
  // update active dot
  document.querySelectorAll('.color-dot').forEach(d => {
    d.classList.toggle('active', d.style.background === currentColor ||
      window.getComputedStyle(d).backgroundColor === hexToRgb(currentColor));
  });
}
function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

// ══════════════════════════════════════════════
//  ZOOM / PAN
// ══════════════════════════════════════════════
const MIN_SCALE = 0.3, MAX_SCALE = 5;

function applyTransform() {
  container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  zoomDisp.textContent = Math.round(scale * 100) + '%';
}

function resetView() {
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const w = canvas.width || MAP_W, h = canvas.height || MAP_H;
  scale = Math.min(vw / w, vh / h) * 0.97;
  panX = (vw - w * scale) / 2;
  panY = (vh - h * scale) / 2;
  applyTransform();
}

function zoomBy(delta, cx, cy) {
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  cx = cx ?? vw / 2;
  cy = cy ?? vh / 2;
  const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale + delta * scale));
  const ratio = newScale / scale;
  panX = cx - ratio * (cx - panX);
  panY = cy - ratio * (cy - panY);
  scale = newScale;
  applyTransform();
}

// Scroll to zoom
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? 0.12 : -0.12;
  zoomBy(delta, cx, cy);
}, { passive: false });

// Middle-mouse pan
viewport.addEventListener('mousedown', e => {
  if (e.button === 1 || mode === 'pan') {
    e.preventDefault();
    isPanning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panStartPX = panX; panStartPY = panY;
    viewport.classList.add('panning-active');
  }
});
window.addEventListener('mousemove', e => {
  if (isPanning) {
    panX = panStartPX + (e.clientX - panStartX);
    panY = panStartPY + (e.clientY - panStartY);
    applyTransform();
  }
  // update coords
  const rect = viewport.getBoundingClientRect();
  const mx = (e.clientX - rect.left - panX) / scale;
  const my = (e.clientY - rect.top  - panY) / scale;
  coordsDisp.textContent = `X: ${Math.round(mx)}  Y: ${Math.round(my)}`;
});
window.addEventListener('mouseup', e => {
  if (e.button === 1 || isPanning) {
    isPanning = false;
    viewport.classList.remove('panning-active');
  }
});

// Touch pan
let touches = {};
viewport.addEventListener('touchstart', e => {
  if (e.touches.length === 1 && mode === 'pan') {
    isPanning = true;
    panStartX = e.touches[0].clientX; panStartY = e.touches[0].clientY;
    panStartPX = panX; panStartPY = panY;
  }
  if (e.touches.length === 2) {
    touches.dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    touches.scale = scale;
  }
}, { passive: true });
viewport.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isPanning) {
    panX = panStartPX + (e.touches[0].clientX - panStartX);
    panY = panStartPY + (e.touches[0].clientY - panStartY);
    applyTransform();
  }
  if (e.touches.length === 2) {
    e.preventDefault();
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, touches.scale * (d / touches.dist)));
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const rect = viewport.getBoundingClientRect();
    zoomBy((newScale - scale) / scale, cx - rect.left, cy - rect.top);
  }
}, { passive: false });
viewport.addEventListener('touchend', () => { isPanning = false; });

// ══════════════════════════════════════════════
//  CANVAS DRAWING
// ══════════════════════════════════════════════
function canvasPos(e) {
  const rect = viewport.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left - panX) / scale,
    y: (e.clientY - rect.top  - panY) / scale,
  };
}

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0 || mode === 'pan') return;
  clearCtxMenu();

  if (mode === 'draw' || mode === 'erase') {
    isDrawing = true;
    drawPath = [];
    const p = canvasPos(e);
    drawPath.push(p);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }
  if (mode === 'arrow') {
    arrowStart = canvasPos(e);
  }
  if (mode === 'marker') {
    placeMarker(canvasPos(e));
  }
});

canvas.addEventListener('mousemove', e => {
  if (!isDrawing && mode !== 'arrow') return;

  if (isDrawing && (mode === 'draw' || mode === 'erase')) {
    const p = canvasPos(e);
    drawPath.push(p);
    ctx.lineWidth = mode === 'erase' ? strokeWidth * 4 : strokeWidth;
    ctx.strokeStyle = mode === 'erase' ? 'rgba(0,0,0,1)' : currentColor;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (mode === 'erase') {
      ctx.globalCompositeOperation = 'destination-out';
    } else {
      ctx.globalCompositeOperation = 'source-over';
    }
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }

  if (mode === 'arrow' && arrowStart) {
    // draw temp arrow
    const p = canvasPos(e);
    if (tempArrow) tempArrow.remove();
    tempArrow = drawArrow(arrowStart.x, arrowStart.y, p.x, p.y, currentColor, true);
  }
});

canvas.addEventListener('mouseup', e => {
  if (e.button !== 0) return;

  if (isDrawing) {
    isDrawing = false;
    ctx.globalCompositeOperation = 'source-over';
    // save snapshot for undo
    const snap = canvas.toDataURL();
    history.push({ type: 'stroke', snap });
  }

  if (mode === 'arrow' && arrowStart) {
    const p = canvasPos(e);
    if (tempArrow) tempArrow.remove();
    tempArrow = null;
    const dist = Math.hypot(p.x - arrowStart.x, p.y - arrowStart.y);
    if (dist > 10) {
      const arrow = drawArrow(arrowStart.x, arrowStart.y, p.x, p.y, currentColor, false);
      history.push({ type: 'arrow', el: arrow });
    }
    arrowStart = null;
  }
});

// ══════════════════════════════════════════════
//  ARROWS
// ══════════════════════════════════════════════
let arrowId = 0;
function drawArrow(x1, y1, x2, y2, color, temp) {
  const id = 'arrow-' + (++arrowId);
  const markerId = 'arrowhead-' + arrowId;

  const defs = arrowSvg.querySelector('defs') || (() => {
    const d = document.createElementNS('http://www.w3.org/2000/svg','defs');
    arrowSvg.prepend(d); return d;
  })();

  const marker = document.createElementNS('http://www.w3.org/2000/svg','marker');
  marker.setAttribute('id', markerId);
  marker.setAttribute('markerWidth','8');
  marker.setAttribute('markerHeight','8');
  marker.setAttribute('refX','6');
  marker.setAttribute('refY','3');
  marker.setAttribute('orient','auto');
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points','0 0, 8 3, 0 6');
  poly.setAttribute('fill', color);
  marker.appendChild(poly);
  defs.appendChild(marker);

  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('id', id);
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', strokeWidth);
  line.setAttribute('marker-end', `url(#${markerId})`);
  line.setAttribute('stroke-linecap','round');
  if (temp) { line.setAttribute('opacity','0.6'); line.setAttribute('stroke-dasharray','6,4'); }

  // right-click to delete
  if (!temp) {
    line.style.cursor = 'pointer';
    line.style.pointerEvents = 'stroke';
    line.addEventListener('contextmenu', e => {
      e.preventDefault();
      showCtxMenuFor(e, null, line, marker);
    });
  }
  arrowSvg.appendChild(line);
  return line;
}

// ══════════════════════════════════════════════
//  MARKERS
// ══════════════════════════════════════════════
function placeMarker(pos) {
  const el = document.createElement('div');
  el.className = 'marker';
  el.style.left = pos.x + 'px';
  el.style.top  = pos.y + 'px';

  const icon = document.createElement('div');
  icon.className = 'marker-icon';
  icon.textContent = markerIcon;
  icon.style.background = currentColor + 'cc';
  icon.style.borderColor = currentColor;

  const label = document.createElement('div');
  label.className = 'marker-label';
  label.textContent = '';
  label.style.display = 'none';

  el.appendChild(icon);
  el.appendChild(label);
  markersLayer.appendChild(el);

  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    e.stopPropagation();
    selectedMarker = el;
    showCtxMenuFor(e, el, null, null);
  });

  // drag marker
  let dragging = false, dx=0, dy=0;
  icon.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.stopPropagation();
    dragging = true;
    dx = e.clientX / scale - parseFloat(el.style.left);
    dy = e.clientY / scale - parseFloat(el.style.top);
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    el.style.left = (e.clientX / scale - dx) + 'px';
    el.style.top  = (e.clientY / scale - dy) + 'px';
  });
  window.addEventListener('mouseup', () => { dragging = false; });

  history.push({ type: 'marker', el });
}

// ══════════════════════════════════════════════
//  CONTEXT MENU
// ══════════════════════════════════════════════
let ctxTarget = { marker: null, arrowLine: null, arrowMarker: null };

function showCtxMenuFor(e, marker, arrowLine, arrowMarker) {
  ctxTarget = { marker, arrowLine, arrowMarker };
  ctxMenu.style.left = e.clientX + 'px';
  ctxMenu.style.top  = e.clientY + 'px';
  ctxMenu.style.display = 'block';
  // hide label edit for arrows
  ctxMenu.children[0].style.display = marker ? '' : 'none';
  ctxMenu.children[1].style.display = '';
}

function clearCtxMenu() {
  ctxMenu.style.display = 'none';
  ctxTarget = { marker: null, arrowLine: null, arrowMarker: null };
}

document.addEventListener('click', clearCtxMenu);
document.addEventListener('contextmenu', e => { if (e.target === canvas || e.target === viewport) clearCtxMenu(); });

window.ctxAction = function(action) {
  if (action === 'delete') {
    if (ctxTarget.marker) ctxTarget.marker.remove();
    if (ctxTarget.arrowLine) { ctxTarget.arrowLine.remove(); ctxTarget.arrowMarker?.remove(); }
  }
  if (action === 'label' && ctxTarget.marker) {
    const el = ctxTarget.marker;
    const rect = el.getBoundingClientRect();
    labelInput.value = el.querySelector('.marker-label').textContent;
    labelPopup.style.left = rect.left + 'px';
    labelPopup.style.top  = (rect.top - 50) + 'px';
    labelPopup.style.display = 'flex';
    labelInput.focus();
    window._editingMarker = el;
  }
  if (action === 'color') {
    const target = ctxTarget.marker?.querySelector('.marker-icon') || ctxTarget.arrowLine;
    if (target) {
      const c = prompt('Enter hex color (e.g. #ff0000):', currentColor);
      if (c && /^#[0-9a-f]{3,6}$/i.test(c)) {
        if (ctxTarget.marker) {
          target.style.background = c + 'cc';
          target.style.borderColor = c;
        }
        if (ctxTarget.arrowLine) {
          ctxTarget.arrowLine.setAttribute('stroke', c);
          ctxTarget.arrowMarker?.querySelector('polygon')?.setAttribute('fill', c);
        }
      }
    }
  }
  clearCtxMenu();
};

window.confirmLabel = function() {
  if (window._editingMarker) {
    const lbl = window._editingMarker.querySelector('.marker-label');
    lbl.textContent = labelInput.value.trim();
    lbl.style.display = lbl.textContent ? '' : 'none';
    window._editingMarker = null;
  }
  labelPopup.style.display = 'none';
};
labelInput.addEventListener('keydown', e => { if (e.key === 'Enter') confirmLabel(); });

// ══════════════════════════════════════════════
//  UNDO / CLEAR
// ══════════════════════════════════════════════
window.undoLast = function() {
  const entry = history.pop();
  if (!entry) return;
  if (entry.type === 'stroke') {
    const prev = history.filter(h => h.type === 'stroke').slice(-1)[0];
    if (prev) {
      const img = new Image();
      img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
      img.src = prev.snap;
    } else {
      ctx.clearRect(0,0,canvas.width,canvas.height);
    }
  }
  if (entry.type === 'arrow') entry.el?.remove();
  if (entry.type === 'marker') entry.el?.remove();
};

window.clearAll = function() {
  if (!confirm('Clear all drawings, arrows and markers?')) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  while (arrowSvg.lastChild) arrowSvg.removeChild(arrowSvg.lastChild);
  markersLayer.innerHTML = '';
  history.length = 0;
};

// ══════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'd') setMode('draw');
  if (e.key === 'a') setMode('arrow');
  if (e.key === 'm') setMode('marker');
  if (e.key === 'p') setMode('pan');
  if (e.key === 'e') setMode('erase');
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undoLast(); }
  if (e.key === '+' || e.key === '=') zoomBy(0.15);
  if (e.key === '-') zoomBy(-0.15);
  if (e.key === '0') resetView();
  if (e.key === 'r') setTeam('red');
  if (e.key === 'b') setTeam('blue');
  if (e.key === 'Escape') { clearCtxMenu(); labelPopup.style.display='none'; }
});

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
window.addEventListener('resize', resetView);
</script>
</body>
</html>
